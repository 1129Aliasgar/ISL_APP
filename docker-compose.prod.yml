# Production: MongoDB Atlas (or any hosted Mongo). Set MONGO_URI to your Atlas connection string.
# No Mongo container here — database is external.

services:
  isl-backend:
    build: ./isl-glove-AI
    container_name: isl-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - PYTHON_PATH=python
      - MODEL_PATH=ml/model.tflite
      - JWT_SECRET=${JWT_SECRET}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
